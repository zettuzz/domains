name: Validate

on:
  pull_request_target:

jobs:
  validate:
    name: Validate Subdomains
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      packages: read
      contents: read
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout domains
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Detect subdomain file changes
        id: detect
        run: |
          files=$(gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files \
            --jq '[.[].filename | select(startswith("subdomains/") and endswith(".json"))] | length')
          if [ "$files" -gt 0 ]; then
            echo "has_subdomain_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_subdomain_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate subdomain ownership
        if: steps.detect.outputs.has_subdomain_changes == 'true'
        env:
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
        run: |
          files=$(gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files \
            --jq '.[].filename | select(startswith("subdomains/") and endswith(".json"))')
          failed=false
          for file in $files; do
            owner=$(jq -r '.owner.github' "$file")
            if [ "$owner" != "$PR_AUTHOR" ]; then
              echo "Error: $file — owner.github \"$owner\" does not match PR author \"$PR_AUTHOR\""
              failed=true
            fi
          done
          [ "$failed" = "true" ] && exit 1 || exit 0

      - name: Validate subdomains
        if: steps.detect.outputs.has_subdomain_changes == 'true'
        uses: is-pinoy-dev/ecosystem/.github/actions/registry-validate@main
        with:
          dir: ./subdomains
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cloudflare-api-token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          cloudflare-zone-id: ${{ secrets.CLOUDFLARE_ZONE_ID }}
